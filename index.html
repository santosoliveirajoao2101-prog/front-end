<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contact-container">
        <h2>Fale Conosco</h2>
        <form id="contact-form">
            <div class="input-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" placeholder="Digite seu nome" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email" required>
            </div>
            <div class="input-group">
                <label for="subject">Assunto</label>
                <input type="text" id="subject" name="subject" placeholder="Digite o assunto" required>
            </div>
            <div class="input-group">
                <label for="message">Mensagem</label>
                <textarea id="message" name="message" placeholder="Digite sua mensagem" rows="5" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Enviar</button>
            <p class="success-message" id="success-message"></p>
        </form>
    </div>

    <script>
        const form = document.getElementById('contact-form');
        const successMessage = document.getElementById('success-message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Aqui você poderia enviar os dados para um servidor via fetch/AJAX
            successMessage.textContent = "Mensagem enviada com sucesso!";
            form.reset();
        });
    </script>
</body>
</html>
